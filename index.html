<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roids — AI Design Engineer on Roids</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      min-height: 100vh;
      background: #f3f3ee;
      color: #0a0a0a;
      font-family: 'Bricolage Grotesque', 'Space Grotesk', sans-serif;
      position: relative;
      overflow-x: hidden;
    }
    a { color: inherit; }
    button { font: inherit; cursor: pointer; }

    .c-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
    }
    .c-top {
      position: relative; z-index: 2;
      display: flex; justify-content: flex-end; align-items: center;
      padding: 24px 36px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
    }
    .c-top .c-tag {
      border: 1.5px solid #0a0a0a;
      padding: 6px 12px;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 8px;
      transition: background .15s, color .15s;
    }
    .c-top .c-tag:hover { background: #0a0a0a; color: #f3f3ee; }
    .c-top .c-tag svg { width: 12px; height: 12px; fill: currentColor; }

    .c-main {
      position: relative; z-index: 2;
      padding: 56px 36px 72px;
      margin: 0 auto;
    }
    .c-main-inner {
      max-width: 980px;
      margin: 0 auto;
      text-align: left;
      transform: translateX(clamp(16px, 4.5vw, 72px));
    }
    .c-headline {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800;
      font-size: clamp(56px, 13vw, 180px);
      line-height: 0.86;
      letter-spacing: -0.045em;
      text-transform: uppercase;
    }
    .c-headline em {
      font-style: normal;
      background: #0a0a0a; color: #f3f3ee;
      padding: 0 .12em;
      display: inline-block;
      transform: skewX(-6deg);
    }
    .c-roids-sub {
      display: flex;
      flex-direction: row;
      align-items: center;
      flex-wrap: nowrap;
      gap: clamp(20px, 4vw, 56px);
      margin-top: 0.02em;
    }
    .c-sub {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(14px, 1.35vw, 18px);
      line-height: 1.35;
      max-width: 16em;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      flex-shrink: 0;
    }
    .c-cmd-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100vw;
      position: relative;
      left: 50%;
      margin-left: -50vw;
      box-sizing: border-box;
      margin-top: 44px;
      padding-top: 28px;
      gap: 18px;
    }
    .c-cmd-row::before {
      content: '';
      width: min(220px, 48vw);
      border-top: 1.5px solid #0a0a0a;
      opacity: 0.55;
      flex-shrink: 0;
    }
    .c-cmd {
      display: flex; align-items: stretch;
      border: 1.5px solid #0a0a0a;
      background: #0a0a0a; color: #f3f3ee;
      width: fit-content;
      max-width: calc(100vw - 48px);
    }
    .c-cmd-text {
      flex: 0 1 auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      letter-spacing: .02em;
      line-height: 1.45;
      padding: 12px 14px;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      border-right: 1.5px solid #f3f3ee;
      text-align: left;
    }
    .c-cmd-text .pfx { color: #888; margin-right: 6px; }
    .c-cmd-text .hi  { color: #fff; text-decoration: underline; }
    .c-copy {
      background: #f3f3ee; color: #0a0a0a;
      border: none;
      padding: 0 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      transition: background .15s, color .15s;
    }
    .c-copy:hover  { background: #c6ff00; }
    .c-copy.copied { background: #0a0a0a; color: #f3f3ee; border-left: 1.5px solid #f3f3ee; }

    @media (min-width: 640px) {
      .c-cmd-text {
        white-space: nowrap;
        overflow-wrap: normal;
        word-break: normal;
      }
    }

    @media (max-width: 720px) {
      .c-main-inner { transform: none; }
      .c-roids-sub {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
      .c-sub { max-width: 100%; }
      .c-cmd {
        flex-direction: column;
        width: 100%;
        max-width: 100%;
      }
      .c-cmd-text {
        border-right: none;
        border-bottom: 1.5px solid #f3f3ee;
        text-align: center;
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: break-word;
        padding: 14px;
      }
    }
  </style>
</head>
<body>

  <div class="c-grid" aria-hidden="true"></div>

  <div class="c-top">
    <a class="c-tag" href="https://github.com/developing-gamer/roids" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.235-3.225-.135-.3-.54-1.53.105-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.645 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      Open source
    </a>
  </div>

  <div class="c-main">
    <div class="c-main-inner">
      <h1 class="c-headline">
        AI Design<br/>Engineer on<br/>
        <span class="c-roids-sub">
          <em>Roids</em>
          <span class="c-sub">Design toolkit for AI agents<br/>that don't suck</span>
        </span>
      </h1>
    </div>
    <div class="c-cmd-row">
      <div class="c-cmd">
        <span class="c-cmd-text">
          <span class="pfx">$</span>
          npx skills add
          <span class="hi">https://github.com/developing-gamer/roids</span>
          --skill roids
        </span>
        <button class="c-copy js-copy" type="button" aria-label="Copy command">
          <span class="label">Copy</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const CMD = 'npx skills add https://github.com/developing-gamer/roids --skill roids';

    document.addEventListener('click', (e) => {
      const btn = e.target.closest('.js-copy');
      if (!btn) return;
      navigator.clipboard.writeText(CMD).then(() => {
        const labelEl = btn.querySelector('.label');
        const original = labelEl ? labelEl.textContent : null;
        btn.classList.add('copied');
        if (labelEl) labelEl.textContent = 'Copied';
        setTimeout(() => {
          btn.classList.remove('copied');
          if (labelEl && original) labelEl.textContent = original;
        }, 1800);
      }).catch(() => {});
    });
  </script>

</body>
</html>
