<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roids — AI Design Engineer on Roids</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: #f3f3ee;
      color: #0a0a0a;
      font-family: 'Bricolage Grotesque', 'Space Grotesk', sans-serif;
      position: relative;
      overflow-x: hidden;
    }
    a { color: inherit; }
    button { font: inherit; cursor: pointer; }
    .c-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
    }
    .c-top {
      position: relative; z-index: 2;
      display: flex; justify-content: flex-end; align-items: center;
      padding: 24px clamp(20px, 3vw, 36px);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
    }
    .c-top .c-tag {
      border: 1.5px solid #0a0a0a;
      padding: 6px 12px;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 8px;
      transition: background .15s, color .15s;
    }
    .c-top .c-tag:hover { background: #0a0a0a; color: #f3f3ee; }
    .c-top .c-tag svg { width: 12px; height: 12px; fill: currentColor; }

    .c-main {
      position: relative; z-index: 2;
      padding: clamp(32px, 5vw, 56px) clamp(24px, 4vw, 36px) clamp(48px, 7vw, 72px);
      margin: 0 auto;
    }
    .c-main-inner {
      width: fit-content;
      max-width: min(980px, 100%);
      margin-inline: auto;
      text-align: left;
    }
    .c-headline {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800;
      font-size: clamp(40px, min(13vw, 21vh), 160px);
      line-height: 0.88;
      letter-spacing: -0.045em;
      text-transform: uppercase;
      width: max-content;
      max-width: 100%;
    }
    .c-headline em {
      font-style: normal;
      background: #0a0a0a; color: #f3f3ee;
      padding: 0 .12em;
      display: inline-block;
      transform: skewX(-6deg);
    }
    .c-roids-sub {
      display: flex;
      flex-direction: row;
      align-items: center;
      flex-wrap: nowrap;
      gap: clamp(20px, 4vw, 56px);
      margin-top: 0.02em;
    }
    .c-sub {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(14px, 1.35vw, 18px);
      line-height: 1.35;
      max-width: 16em;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      flex-shrink: 0;
    }
    .c-cmd-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100vw;
      position: relative;
      left: 50%;
      margin-left: -50vw;
      box-sizing: border-box;
      margin-top: clamp(28px, 4vw, 44px);
      padding: clamp(20px, 3vw, 28px) clamp(24px, 4vw, 36px) 0;
      gap: 18px;
    }
    .c-cmd-row::before {
      content: '';
      width: min(220px, 48vw);
      border-top: 1.5px solid #0a0a0a;
      opacity: 0.55;
      flex-shrink: 0;
    }
    .c-cmd {
      display: flex; align-items: stretch;
      border: 1.5px solid #0a0a0a;
      background: #0a0a0a; color: #f3f3ee;
      width: fit-content;
      max-width: 100%;
    }
    .c-cmd-text {
      flex: 0 1 auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      letter-spacing: .02em;
      line-height: 1.45;
      padding: 12px 14px;
      white-space: nowrap;
      border-right: 1.5px solid #f3f3ee;
      text-align: left;
    }
    .c-cmd-text .pfx { color: #888; margin-right: 6px; }
    .c-cmd-text .hi  { color: #fff; text-decoration: underline; }
    .c-copy {
      background: #f3f3ee; color: #0a0a0a;
      border: none;
      padding: 0 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      transition: background .15s, color .15s;
    }
    .c-copy:hover  { background: #c6ff00; }
    .c-copy.copied { background: #0a0a0a; color: #f3f3ee; border-left: 1.5px solid #f3f3ee; }

    .c-launch {
      width: 100%;
      max-width: min(720px, 100%);
      margin: clamp(28px, 4vw, 48px) auto 0;
    }
    .c-launch .c-launch-spot { position: relative; }
    .c-launch .c-launch-ribbon {
      position: absolute; top: -10px; left: 16px; z-index: 2;
      background: #c6ff00; color: #0a0a0a;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase;
      padding: 6px 12px; border: 1.5px solid #0a0a0a;
      box-shadow: 3px 3px 0 #0a0a0a;
    }
    .c-launch .c-launch-preview {
      position: relative;
      aspect-ratio: 16 / 9;
      border-radius: 14px;
      border: 1.5px solid #0a0a0a;
      box-shadow: 0 24px 70px rgba(0,0,0,0.12);
      overflow: hidden;
      background: #000;
    }
    .c-launch .c-launch-play {
      position: absolute; inset: 0;
      z-index: 1;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: #f3f3ee; background: transparent; border: none;
      padding: 16px;
      cursor: pointer;
      transition: color .15s, transform .12s;
    }
    .c-launch .c-launch-play:hover { color: #c6ff00; }
    .c-launch .c-launch-play:active { transform: scale(0.98); }
    .c-launch .c-launch-play-in {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      padding: 12px 20px;
      background: #0a0a0a;
      border: 1.5px solid #0a0a0a;
      border-radius: 999px;
      /* even cream ring (was single-offset 4px 4px, read as “white on one end”) */
      box-shadow: 0 0 0 2px #f3f3ee;
      color: #f3f3ee;
    }
    .c-launch .c-launch-play:hover .c-launch-play-in {
      background: #c6ff00; color: #0a0a0a; border-color: #0a0a0a;
      box-shadow: 0 0 0 2px #0a0a0a, 0 0 0 4px #f3f3ee;
    }
    .c-launch .c-launch-play-ico {
      width: 20px; height: 20px; flex-shrink: 0; fill: currentColor;
    }

    /* Do not set display on dialog without :open — author display:flex overrides
       UA "display: none" and leaves the (closed) dialog + video in the page flow. */
    .c-launch-dlg {
      max-width: none; margin: 0; border: none; box-sizing: border-box;
      background: transparent; width: 100%;
    }
    .c-launch-dlg:not([open]) {
      display: none !important;
    }
    .c-launch-dlg[open] {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 100dvh;
      max-height: 100dvh;
      padding: clamp(12px, 2.5vw, 28px);
      overflow: auto;
    }
    .c-launch-dlg::backdrop { background: rgba(10, 10, 10, 0.82); }
    .c-launch-dlg .c-launch-dlg-surface {
      position: relative;
      width: 100%;
      max-width: min(900px, 100%);
    }
    .c-launch-dlg .c-launch-dlg-x-form {
      position: absolute; top: 8px; right: 8px; z-index: 20;
      margin: 0; padding: 0; border: 0; background: transparent;
    }
    .c-launch-dlg .c-launch-dlg-x {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1.5px solid #0a0a0a; background: #f3f3ee; color: #0a0a0a;
      font: inherit; font-size: 22px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 3px 3px 0 #0a0a0a;
      transition: background .15s, color .15s;
    }
    .c-launch-dlg .c-launch-dlg-x:hover { background: #c6ff00; }
    .c-launch-dlg video {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      border: 1.5px solid #0a0a0a;
      background: #000;
    }

    @media (max-width: 720px) {
      body {
        display: flex;
        flex-direction: column;
      }
      .c-top {
        flex-shrink: 0;
      }
      .c-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: stretch;
        min-height: 0;
        padding: clamp(12px, 3vw, 24px) clamp(20px, 4vw, 28px);
      }
      .c-main-inner {
        width: 100%;
        max-width: 100%;
        text-align: center;
      }
      .c-headline {
        width: 100%;
        max-width: 100%;
      }
      .c-roids-sub {
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      .c-sub {
        max-width: 100%;
        font-size: 14px;
        text-align: center;
      }
      .c-top .c-tag { padding: 5px 10px; font-size: 11px; }
      .c-top .c-tag svg { width: 11px; height: 11px; }

      .c-launch { margin-top: clamp(20px, 3vw, 32px); }

      .c-cmd-row {
        margin-top: clamp(20px, 4vw, 32px);
        padding-top: clamp(16px, 3vw, 24px);
      }
      .c-cmd {
        flex-direction: row;
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
        border-radius: 999px;
        overflow: hidden;
        padding: 4px;
        gap: 6px;
      }
      .c-cmd-text {
        flex: 1 1 auto;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        padding: 10px 14px;
        font-size: 11.5px;
        border-right: none;
        text-align: left;
      }
      .c-copy {
        background: #c6ff00;
        color: #0a0a0a;
        border-radius: 999px;
        padding: 0 16px;
        font-size: 10.5px;
      }
      .c-copy.copied {
        background: #f3f3ee;
        color: #0a0a0a;
        border-left: none;
      }
    }
  </style>
</head>
<body>

  <div class="c-grid" aria-hidden="true"></div>

  <div class="c-top">
    <a class="c-tag" href="https://github.com/developing-gamer/roids" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.235-3.225-.135-.3-.54-1.53.105-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.645 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      Open source
    </a>
  </div>

  <div class="c-main">
    <div class="c-main-inner">
      <h1 class="c-headline">
        AI Design<br/>Engineer on<br/>
        <span class="c-roids-sub">
          <em>Roids</em>
          <span class="c-sub">Design toolkit for AI agents<br/>that don't suck</span>
        </span>
      </h1>
    </div>

    <div class="c-cmd-row">
      <div class="c-cmd">
        <span class="c-cmd-text">
          <span class="pfx">$</span>
          npx skills add <span class="hi">https://github.com/developing-gamer/roids</span>
        </span>
        <button class="c-copy js-copy" type="button" aria-label="Copy command">
          <span class="label">Copy</span>
        </button>
      </div>
    </div>

    <div class="c-launch">
      <div class="c-launch-spot">
        <span class="c-launch-ribbon">New</span>
        <div class="c-launch-preview">
          <button
            type="button"
            class="c-launch-play js-launch-open"
            aria-haspopup="dialog"
            aria-controls="c-launch-dlg"
          >
            <span class="c-launch-play-in">
              <svg class="c-launch-play-ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7-11-7z" /></svg>
              <span>Watch demo</span>
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <dialog class="c-launch-dlg" id="c-launch-dlg" aria-label="Roids launch video">
    <div class="c-launch-dlg-surface">
      <form class="c-launch-dlg-x-form" method="dialog">
        <button type="submit" class="c-launch-dlg-x" aria-label="Close video">&times;</button>
      </form>
      <video
        id="c-launch-video"
        src="launch.mp4"
        controls
        playsinline
        preload="metadata"
      ></video>
    </div>
  </dialog>

  <script>
    const CMD = 'npx skills add https://github.com/developing-gamer/roids';
    const launchDlg = document.getElementById('c-launch-dlg');
    const launchVideo = document.getElementById('c-launch-video');

    document.addEventListener('click', (e) => {
      const btn = e.target.closest('.js-copy');
      if (btn) {
        navigator.clipboard.writeText(CMD).then(() => {
          const labelEl = btn.querySelector('.label');
          const original = labelEl ? labelEl.textContent : null;
          btn.classList.add('copied');
          if (labelEl) labelEl.textContent = 'Copied';
          setTimeout(() => {
            btn.classList.remove('copied');
            if (labelEl && original) labelEl.textContent = original;
          }, 1800);
        }).catch(() => {});
        return;
      }

      if (e.target.closest('.js-launch-open')) {
        e.preventDefault();
        launchDlg.showModal();
        if (launchVideo) {
          launchVideo.muted = false;
          launchVideo.play().catch(() => {
            launchVideo.muted = true;
            return launchVideo.play();
          });
        }
        return;
      }

      /* Click dimmed area (not on video / surface) to close */
      if (launchDlg.hasAttribute('open') && e.target === launchDlg) {
        e.preventDefault();
        launchDlg.close();
      }
    });

    launchDlg.addEventListener('close', () => {
      if (launchVideo) {
        launchVideo.pause();
        launchVideo.currentTime = 0;
      }
    });
  </script>

</body>
</html>
