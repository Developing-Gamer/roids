<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roids — AI Design Engineer on Roids</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=Azeret+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #090909;
      --surface: #111111;
      --border-bright: #2e2e2e;
      --text: #f2f2f0;
      --muted: #6a6a6a;
      --muted-2: #444;
      --accent: #c6ff00;
      --accent-dim: rgba(198, 255, 0, 0.08);
      --accent-glow: rgba(198, 255, 0, 0.18);
    }

    html {
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── noise overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
    }

    /* ── glow blob ── */
    .glow-blob {
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(198, 255, 0, 0.055) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: blob-pulse 6s ease-in-out infinite;
    }

    @keyframes blob-pulse {
      0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
      50%       { opacity: 0.65; transform: translateX(-50%) scale(1.08); }
    }

    /* ── grid background ── */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 30%, transparent 100%);
    }

    @keyframes fade-down {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── hero ── */
    .hero {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 120px 24px 140px;
      gap: 0;
    }

    /* badge — open source (monochrome) */
    .badge.badge-oss {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #0a0a0a;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 100px;
      padding: 6px 14px 6px 10px;
      font-family: 'Azeret Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      color: #e8e8e6;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 36px;
      text-decoration: none;
      transition: border-color 0.2s ease, background 0.2s ease;
      animation: fade-up 0.55s 0.1s ease both;
    }

    .badge.badge-oss:hover {
      border-color: rgba(255, 255, 255, 0.28);
      background: #121212;
      color: #fff;
    }

    .badge-oss-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      fill: currentColor;
      opacity: 0.95;
    }

    /* headline */
    .headline {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(44px, 7.5vw, 88px);
      line-height: 1.0;
      letter-spacing: -0.03em;
      color: var(--text);
      max-width: 900px;
      margin-bottom: 28px;
      animation: fade-up 0.6s 0.2s ease both;
    }

    .headline em {
      font-style: normal;
      color: var(--accent);
      position: relative;
    }

    .headline em::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: var(--accent);
      opacity: 0.35;
      border-radius: 2px;
    }

    /* subtitle */
    .subtitle {
      font-family: 'Azeret Mono', monospace;
      font-size: clamp(14px, 1.6vw, 18px);
      font-weight: 300;
      color: var(--muted);
      max-width: 520px;
      line-height: 1.6;
      letter-spacing: 0.01em;
      margin-bottom: 56px;
      animation: fade-up 0.6s 0.3s ease both;
    }

    /* command block */
    .command-wrap {
      animation: fade-up 0.6s 0.42s ease both;
    }

    .command-block {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border-bright);
      border-radius: 10px;
      padding: 13px 18px 13px 20px;
      position: relative;
      transition: border-color 0.2s;
    }

    .command-block:hover {
      border-color: rgba(198, 255, 0, 0.3);
    }

    .command-text {
      font-family: 'Azeret Mono', monospace;
      font-size: 13.5px;
      font-weight: 400;
      color: #d0d0cc;
      letter-spacing: 0.025em;
      white-space: nowrap;
    }

    .command-text .cmd-prefix {
      color: var(--muted-2);
      margin-right: 4px;
    }

    .command-text .cmd-highlight {
      color: var(--accent);
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      border-radius: 6px;
      padding: 7px 13px;
      font-family: 'Azeret Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
      flex-shrink: 0;
    }

    .copy-btn:hover {
      opacity: 0.88;
    }

    .copy-btn:active {
      transform: scale(0.96);
    }

    .copy-btn.copied {
      background: #888;
    }

    .copy-btn svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    /* ── animations ── */
    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── responsive ── */
    @media (max-width: 600px) {
      .hero {
        padding: 80px 20px 100px;
      }
      .command-block {
        flex-direction: column;
        gap: 12px;
        padding: 16px;
        align-items: flex-start;
      }
      .command-text {
        font-size: 11.5px;
        word-break: break-all;
        white-space: normal;
      }
      .copy-btn {
        width: 100%;
        justify-content: center;
      }
    }

  </style>
</head>
<body>

  <div class="glow-blob" aria-hidden="true"></div>
  <div class="grid-bg" aria-hidden="true"></div>

  <canvas id="streaks" aria-hidden="true" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;"></canvas>

  <!-- hero -->
  <section class="hero">

    <a
      href="https://github.com/developing-gamer/roids"
      class="badge badge-oss"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Open source — Roids on GitHub"
    >
      <svg class="badge-oss-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.235-3.225-.135-.3-.54-1.53.105-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.645 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      Open source
    </a>

    <h1 class="headline">
      AI Design Engineer<br />on <em>Roids</em>
    </h1>

    <p class="subtitle">
      Design toolkit for AI agents that don't suck
    </p>

    <div class="command-wrap">
      <div class="command-block">
        <span class="command-text">
          <span class="cmd-prefix">$</span>
          npx skills add
          <span class="cmd-highlight">https://github.com/developing-gamer/roids</span>
          --skill roids
        </span>
        <button class="copy-btn" id="copyBtn" type="button" onclick="copyCommand()" aria-label="Copy command">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="5" y="5" width="9" height="9" rx="1.5"/>
            <path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2h-6A1.5 1.5 0 0 0 2 3.5v6A1.5 1.5 0 0 0 3.5 11H5"/>
          </svg>
          Copy
        </button>
      </div>
    </div>

  </section>

  <script>
    /* ── vertical shooting streaks ── */
    (function () {
      const canvas = document.getElementById('streaks');
      const ctx = canvas.getContext('2d');

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      const STREAK_COUNT = 18;
      const streaks = [];

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function laneX(slot) {
        const w = canvas.width || 1;
        return ((slot + 0.5) / STREAK_COUNT) * w;
      }

      const TAIL_GROW_SEC = 0.42; // time to reach full tail length after spawn

      function spawn(s) {
        s.x          = laneX(s.slot);
        s.y          = rand(-canvas.height * 0.5, canvas.height * 1.1);
        s.speed      = rand(90, 280);       // px/s
        s.len        = rand(60, 200);       // final tail length (px)
        s.currentLen = 0;                   // grows toward s.len (not full on spawn)
        s.alpha      = rand(0.25, 0.75);
        s.delay      = rand(0, 3);          // seconds before first appear
        s.active     = false;
      }

      for (let i = 0; i < STREAK_COUNT; i++) {
        const s = { slot: i };
        spawn(s);
        s.y = rand(-canvas.height * 2, canvas.height); // scatter initial positions
        streaks.push(s);
      }

      let last = null;

      function tick(ts) {
        if (!last) last = ts;
        const dt = Math.min((ts - last) / 1000, 0.05); // delta in seconds, capped
        last = ts;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (const s of streaks) {
          s.x = laneX(s.slot); // keep lanes centered when viewport resizes
          if (s.delay > 0) {
            s.delay -= dt;
            continue;
          }
          s.active = true;
          s.y -= s.speed * dt;  // move upward
          s.currentLen = Math.min(s.len, s.currentLen + (s.len / TAIL_GROW_SEC) * dt);

          // reset when fully off screen top
          if (s.y + s.len < 0) {
            spawn(s);
            s.y = canvas.height + s.len;
          }

          if (s.currentLen < 0.75) continue;

          // draw gradient streak: head (top) bright, tail (bottom) transparent
          const headY = s.y;
          const tailY = s.y + s.currentLen;

          const grad = ctx.createLinearGradient(s.x, tailY, s.x, headY);
          grad.addColorStop(0, `rgba(100, 255, 80, 0)`);
          grad.addColorStop(0.6, `rgba(140, 255, 100, ${s.alpha * 0.4})`);
          grad.addColorStop(1,   `rgba(198, 255, 0,  ${s.alpha})`);

          ctx.beginPath();
          ctx.moveTo(s.x, tailY);
          ctx.lineTo(s.x, headY);
          ctx.strokeStyle = grad;
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    })();

    function copyCommand() {
      const cmd = 'npx skills add https://github.com/developing-gamer/roids --skill roids';
      navigator.clipboard.writeText(cmd).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.classList.add('copied');
        btn.innerHTML = `
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
            <polyline points="2,8 6,12 14,4"/>
          </svg>
          Copied
        `;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <rect x="5" y="5" width="9" height="9" rx="1.5"/>
              <path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2h-6A1.5 1.5 0 0 0 2 3.5v6A1.5 1.5 0 0 0 3.5 11H5"/>
            </svg>
            Copy
          `;
        }, 2200);
      });
    }
  </script>

</body>
</html>
